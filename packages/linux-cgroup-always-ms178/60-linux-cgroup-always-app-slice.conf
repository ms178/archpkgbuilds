[Slice]
# CachyOS linux-cgroup-always – app.slice drop-in
# For: graphical apps, games, systemd-run --user --scope terminals.
#
# Weight ratios vs siblings (app 200 : session 100 : background 50)
# → under full contention app gets ~57 % of CPU / IO.
#
# Every setting below is a valid systemd.resource-control(5) option
# for [Slice] sections.  Exec-level knobs (Nice=, OOMScoreAdjust=,
# TimerSlackNSec=, CPUSchedulingPolicy=, MemoryTHP=) are *not*
# valid here and are intentionally omitted.
# ── CPU ───────────────────────────────────────────────────────────
CPUWeight=200
# During user-manager startup (pipewire / portal / kwin init) give
# app.slice the same weight as session.slice so DE components that
# land here don't starve background services.  After startup the
# runtime weight (200) takes over and favours interactive / gaming.
StartupCPUWeight=100
# ── IO ────────────────────────────────────────────────────────────
IOWeight=200
StartupIOWeight=100
# ── systemd-oomd integration ─────────────────────────────────────
# Enable oomd monitoring on this slice.  When sustained memory
# pressure inside the slice exceeds the limit, oomd selects one
# child scope/service to kill (respecting ManagedOOMPreference on
# those children).
ManagedOOMMemoryPressure=kill
# 80 % – generous headroom so a game's working-set growth does
# not trigger oomd prematurely.
ManagedOOMMemoryPressureLimit=80%
# Require 30 s of sustained pressure before acting – absorbs
# transient spikes from level loads / shader compilation.
ManagedOOMMemoryPressureDurationSec=30s
