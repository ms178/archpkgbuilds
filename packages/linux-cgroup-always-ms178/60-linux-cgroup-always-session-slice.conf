[Slice]
# CachyOS linux-cgroup-always – session.slice drop-in
# For: PAM login sessions, display-manager scopes.
#
# Weight 100 is the systemd default – we set it explicitly so that
# the cpu and io controllers are guaranteed to be enabled at this
# level of the hierarchy (required for sibling weights to take
# effect).
# ── CPU ───────────────────────────────────────────────────────────
CPUWeight=100
StartupCPUWeight=100
# ── IO ────────────────────────────────────────────────────────────
IOWeight=100
StartupIOWeight=100
# ── systemd-oomd integration ─────────────────────────────────────
ManagedOOMMemoryPressure=kill
ManagedOOMMemoryPressureLimit=60%
ManagedOOMMemoryPressureDurationSec=20s
