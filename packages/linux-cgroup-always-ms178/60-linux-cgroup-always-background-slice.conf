[Slice]
# CachyOS linux-cgroup-always – background.slice drop-in
# For: user services (pipewire, xdg-desktop-portal, syncthing, …).
#
# Weight ratio vs siblings: 50 / (200+100+50) ≈ 14 % under
# full contention.  Work-conserving: when foreground is idle
# background gets 100 %.
# ── CPU ───────────────────────────────────────────────────────────
CPUWeight=50
# During user-manager startup give background.slice equal weight
# so pipewire, wireplumber, portals etc. initialise without stalls.
# After startup the low runtime weight (50) keeps background
# services from competing with interactive / gaming workloads.
StartupCPUWeight=100
# ── IO ────────────────────────────────────────────────────────────
IOWeight=50
StartupIOWeight=100
# ── systemd-oomd integration ─────────────────────────────────────
ManagedOOMMemoryPressure=kill
# 50 % – tighter than app.slice; background services should be
# first candidates for oomd intervention.
ManagedOOMMemoryPressureLimit=50%
# 10 s – act faster than for interactive slices.
ManagedOOMMemoryPressureDurationSec=10s
